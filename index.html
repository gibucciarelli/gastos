<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root { --bg:#FFF; --surface:#F7F8F5; --card:#FFF; --border:#E8EDE3; --green:#4A7C59; --orange:#E8732A; --text:#2D4A38; --muted:#8FA896; --danger:#D94F3D; --blue:#3B82F6; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,Arial,sans-serif; font-size:14px; }
  .header { position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:1px solid var(--border); padding:10px 16px 8px; }
  .header-row { display:flex; align-items:center; justify-content:space-between; }
  .app-title { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
  .header-actions { display:flex; gap:6px; }
  .hdr-btn { padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:4px; }
  .hdr-btn.whatsapp { background:#25D366; color:#fff; border-color:#25D366; }
  .hdr-btn.pdf { background:var(--orange); color:#fff; border-color:var(--orange); }
  .hdr-btn.backup { background:var(--blue); color:#fff; border-color:var(--blue); }
  .hdr-btn.restore { background:var(--green); color:#fff; border-color:var(--green); }
  .month-nav { display:flex; align-items:center; gap:10px; margin-top:6px; }
  .nav-btn { background:var(--card); border:1px solid var(--border); color:var(--text); width:30px; height:30px; border-radius:8px; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .month-display { flex:1; text-align:center; cursor:pointer; }
  .month-name { font-size:17px; font-weight:700; line-height:1; }
  .month-year { font-size:12px; color:var(--muted); margin-top:1px; }
  .tabs { display:flex; margin:8px 12px; background:var(--surface); border-radius:10px; padding:3px; border:1px solid var(--border); gap:3px; }
  .tab { flex:1; padding:8px; border-radius:8px; border:none; background:transparent; color:var(--muted); font-family:-apple-system,Arial,sans-serif; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; }
  .tab.active-pagar,.tab.active-pago { background:var(--orange); color:#fff; }
  .badge { background:rgba(255,255,255,0.25); border-radius:20px; padding:1px 7px; font-size:11px; }
  .tab:not(.active-pagar):not(.active-pago) .badge { background:var(--border); color:var(--muted); }
  .days-list { padding:4px 12px 100px; }
  .day-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:5px; overflow:hidden; }
  .day-card.is-today { border-color:rgba(232,115,42,0.4); }
  .day-header { display:flex; align-items:center; justify-content:space-between; padding:9px 11px; cursor:pointer; }
  .day-left { display:flex; align-items:center; gap:8px; }
  .day-badge { width:32px; height:32px; border-radius:8px; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .day-badge.today-badge { background:var(--orange); border-color:var(--orange); color:#fff; }
  .day-num { font-size:13px; font-weight:700; }
  .day-week { font-size:12px; color:var(--muted); font-weight:500; }
  .today-pill { background:rgba(232,115,42,0.12); color:var(--orange); font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; text-transform:uppercase; }
  .day-right { display:flex; align-items:center; gap:6px; }
  .day-total { font-size:12px; color:var(--muted); }
  .add-btn { width:26px; height:26px; border-radius:7px; background:var(--orange); border:none; color:#fff; font-size:20px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; line-height:1; }
  .chevron { color:var(--muted); font-size:12px; transition:transform 0.2s; }
  .chevron.open { transform:rotate(180deg); }
  .items-list { padding:0 8px 8px; display:flex; flex-direction:column; gap:3px; }
  .item-row { display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:9px 10px; }
  .item-row.is-paid { border-color:rgba(74,124,89,0.15); background:rgba(74,124,89,0.04); }
  .item-row.is-recurring { border-left:3px solid var(--blue); }
  .checkbox { width:20px; height:20px; border-radius:5px; border:2px solid var(--border); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .checkbox.checked { background:var(--green); border-color:var(--green); }
  .checkbox.checked::after { content:'✓'; color:#fff; font-size:12px; font-weight:800; }
  .item-info { flex:1; display:flex; justify-content:space-between; align-items:center; gap:8px; cursor:pointer; min-width:0; }
  .item-main { display:flex; flex-direction:column; min-width:0; flex:1; }
  .item-desc { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item-desc.paid-text { color:var(--muted); text-decoration:line-through; }
  .item-repeat-tag { font-size:10px; color:var(--blue); font-weight:600; margin-top:1px; }
  .item-valor { font-size:13px; font-weight:600; white-space:nowrap; flex-shrink:0; }
  .item-valor.paid-valor { color:var(--green); }
  .delete-btn { background:none; border:none; color:var(--muted); cursor:pointer; padding:2px; font-size:13px; flex-shrink:0; }
  .empty-tab { text-align:center; padding:50px 20px; color:var(--muted); }
  .summary { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin:6px 12px 12px; padding:12px 14px; }
  .summary-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; }
  .summary-label { font-size:12px; color:var(--muted); font-weight:500; }
  .summary-label.total-label { font-size:13px; color:var(--text); font-weight:700; }
  .summary-val { font-size:13px; font-weight:600; }
  .summary-val.orange { color:var(--orange); }
  .summary-val.green { color:var(--green); }
  .summary-val.total-val { font-size:16px; font-weight:700; color:var(--text); }
  .summary-divider { height:1px; background:var(--border); margin:5px 0; }
  .summary-divider.thick { height:1.5px; margin:8px 0; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:200; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .modal-overlay.show { opacity:1; pointer-events:all; }
  .modal-sheet { width:100%; background:var(--surface); border-top-left-radius:18px; border-top-right-radius:18px; border-top:1px solid var(--border); padding:16px 16px 40px; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .modal-overlay.show .modal-sheet { transform:translateY(0); }
  .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
  .modal-title { font-size:14px; font-weight:700; margin-bottom:14px; }
  .field-label { font-size:11px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .field-input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px; font-size:15px; color:var(--text); font-family:-apple-system,Arial,sans-serif; margin-bottom:12px; outline:none; }
  .field-input:focus { border-color:var(--orange); }
  .field-input::placeholder { color:var(--muted); }

  /* REPEAT OPTIONS */
  .repeat-options { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .repeat-opt { flex:1; min-width:80px; padding:9px 6px; border-radius:9px; border:1.5px solid var(--border); background:var(--card); color:var(--muted); font-family:-apple-system,Arial,sans-serif; font-size:12px; font-weight:600; cursor:pointer; text-align:center; transition:all 0.15s; }
  .repeat-opt.selected { border-color:var(--blue); background:rgba(59,130,246,0.08); color:var(--blue); }

  .modal-actions { display:flex; gap:10px; margin-top:4px; }
  .btn-cancel { flex:1; padding:12px; border-radius:10px; background:var(--card); border:1px solid var(--border); color:var(--muted); font-family:-apple-system,Arial,sans-serif; font-size:14px; font-weight:600; cursor:pointer; }
  .btn-save { flex:2; padding:12px; border-radius:10px; background:var(--orange); border:none; color:#fff; font-family:-apple-system,Arial,sans-serif; font-size:14px; font-weight:700; cursor:pointer; }

  /* PICKER */
  .picker-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:300; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .picker-overlay.show { opacity:1; pointer-events:all; }
  .picker-box { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:18px; width:85%; max-width:300px; }
  .picker-year-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .picker-year-btn { background:var(--card); border:1px solid var(--border); color:var(--text); width:34px; height:34px; border-radius:9px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .picker-year-label { font-size:17px; font-weight:700; }
  .month-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
  .month-item { padding:10px; border-radius:8px; background:var(--card); border:1px solid var(--border); color:var(--muted); font-family:-apple-system,Arial,sans-serif; font-size:13px; font-weight:600; cursor:pointer; text-align:center; }
  .month-item.selected { background:var(--orange); border-color:var(--orange); color:#fff; }

  /* CONFIRM */
  .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:400; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .confirm-overlay.show { opacity:1; pointer-events:all; }
  .confirm-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px 18px; width:82%; max-width:280px; text-align:center; }
  .confirm-title { font-size:15px; font-weight:700; margin-bottom:7px; }
  .confirm-msg { font-size:13px; color:var(--muted); margin-bottom:18px; line-height:1.5; }
  .confirm-actions { display:flex; gap:9px; }
  .btn-confirm-cancel { flex:1; padding:11px; border-radius:9px; background:var(--card); border:1px solid var(--border); color:var(--muted); font-family:-apple-system,Arial,sans-serif; font-size:13px; font-weight:600; cursor:pointer; }
  .btn-confirm-ok { flex:1; padding:11px; border-radius:9px; background:var(--danger); border:none; color:#fff; font-family:-apple-system,Arial,sans-serif; font-size:13px; font-weight:700; cursor:pointer; }

  /* TOAST */
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); background:#2D4A38; color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:600; z-index:999; transition:transform 0.3s; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  .fixos-label { font-size:12px; color:var(--text); font-weight:700; }
  .fixos-val { font-size:16px; font-weight:700; color:var(--green); }

  .fixos-label { font-size:12px; color:var(--text); font-weight:700; letter-spacing:0.5px; text-transform:uppercase; }
  .fixos-val { font-size:16px; font-weight:700; color:var(--green); }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <span class="app-title">💸 Gastos do Mês</span>
    <div class="header-actions">
      <button class="hdr-btn whatsapp" onclick="shareWhatsApp()">📲 WhatsApp</button>
      <button class="hdr-btn pdf" onclick="exportPDF()">📄 PDF</button>
      <button class="hdr-btn backup" onclick="backupData()">💾</button>
      <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="restoreData(event)">
      <button class="hdr-btn restore" onclick="document.getElementById('restoreInput').click()">📥</button>
    </div>
  </div>
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-display" onclick="openPicker()">
      <div class="month-name" id="monthName"></div>
      <div class="month-year" id="yearName"></div>
    </div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active-pagar" id="tabPagar" onclick="setTab('pagar')">A pagar <span class="badge" id="badgePagar">0</span></button>
  <button class="tab" id="tabPago" onclick="setTab('pago')">Pago <span class="badge" id="badgePago">0</span></button>
</div>

<div class="days-list" id="daysList"></div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Novo item</div>
    <div class="field-label">Descrição</div>
    <input class="field-input" id="inputDesc" type="text" placeholder="ex: aluguel, internet, cartão..." autocomplete="off">
    <div class="field-label">Valor (R$)</div>
    <input class="field-input" id="inputValor" type="tel" placeholder="0,00" inputmode="numeric">
    <div class="field-label">Repetição</div>
    <div class="repeat-options">
      <button class="repeat-opt selected" id="rep-none" onclick="setRepeat('none')">Não repetir</button>
      <button class="repeat-opt" id="rep-monthly" onclick="setRepeat('monthly')">🔁 Todo mês</button>
      <button class="repeat-opt" id="rep-weekly" onclick="setRepeat('weekly')">📅 Toda semana</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btnSave" onclick="saveItem()">Adicionar</button>
    </div>
  </div>
</div>

<!-- MONTH PICKER -->
<div class="picker-overlay" id="pickerOverlay" onclick="handlePickerClick(event)">
  <div class="picker-box">
    <div class="picker-year-nav">
      <button class="picker-year-btn" onclick="changePickerYear(-1)">‹</button>
      <span class="picker-year-label" id="pickerYearLabel"></span>
      <button class="picker-year-btn" onclick="changePickerYear(1)">›</button>
    </div>
    <div class="month-grid" id="monthGrid"></div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">Excluir item</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-confirm-ok" onclick="confirmDelete()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const WD=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const now=new Date();
let cY=now.getFullYear(),cM=now.getMonth(),tab='pagar',dt={},mDay=null,eId=null,dTgt=null,pY=cY,curRepeat='none';

// ---- STORAGE ----
function gk(y,m){return`gastos_${y}_${String(m).padStart(2,'0')}`;}
function ld(y,m){try{const r=localStorage.getItem(gk(y,m));return r?JSON.parse(r):{}}catch(e){return{};}}
function sd(y,m,d){try{localStorage.setItem(gk(y,m),JSON.stringify(d));}catch(e){}}
function gcd(){const k=gk(cY,cM);if(!dt[k])dt[k]=ld(cY,cM);return dt[k];}
function pc(){sd(cY,cM,gcd());}
function brl(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function pv(s){const n=s.replace(/\D/g,'');return n?parseInt(n,10)/100:0;}
function fv(s){const n=s.replace(/\D/g,'');if(!n)return'';return(parseInt(n,10)/100).toFixed(2).replace('.',',');}

// ---- REPEAT TAG ----
function repeatLabel(r){
  if(r==='monthly') return '🔁 Repete todo mês';
  if(r==='weekly') return '📅 Repete toda semana';
  return '';
}

// ---- PROPAGATE RECURRING ITEMS ----
function injectRecurring(y, m) {
  const key = gk(y, m);
  if(!dt[key]) dt[key] = ld(y, m);
  const existing = dt[key];
  const daysInTarget = new Date(y, m+1, 0).getDate();

  const allKeys = Object.keys(localStorage).filter(k => k.startsWith('gastos_'));
  if(!allKeys.includes(key)) allKeys.push(key);

  allKeys.forEach(k => {
    try {
      const isCurrentMonth = k === key;
      const monthData = isCurrentMonth ? JSON.parse(JSON.stringify(existing)) : JSON.parse(localStorage.getItem(k) || '{}');
      const [, ky, km] = k.match(/gastos_(\d+)_(\d+)/);
      const srcY = parseInt(ky), srcM = parseInt(km) - 1;

      Object.entries(monthData).forEach(([day, items]) => {
        (items || []).forEach(item => {
          if(!item.repeat || item.repeat === 'none') return;
          if(item.recurringId) return;

          let shouldAdd = false;
          if(item.repeat === 'monthly') { if(!isCurrentMonth) shouldAdd = true; }
          if(item.repeat === 'weekly') { shouldAdd = true; }
          if(!shouldAdd) return;

          const targetDay = parseInt(day);

          if(item.repeat === 'monthly') {
            if(targetDay > daysInTarget) return;
            const dayKey = String(targetDay);
            if(!existing[dayKey]) existing[dayKey] = [];
            const alreadyExists = existing[dayKey].some(i => i.recurringId === item.id || i.id === item.id);
            if(!alreadyExists) {
              const isCartao = item.desc.toUpperCase().includes('CARTAO') || item.desc.toUpperCase().includes('CART\u00c3O');
              existing[dayKey].push({
                id: `${item.id}_${y}_${m}`,
                recurringId: item.id,
                desc: item.desc,
                valor: isCartao ? 0 : item.valor,
                pago: false,
                repeat: 'monthly'
              });
            }
          }

          if(item.repeat === 'weekly') {
            const srcDate = new Date(srcY, srcM, parseInt(day));
            const srcWeekday = srcDate.getDay();
            for(let d2=1; d2<=daysInTarget; d2++) {
              if(isCurrentMonth && d2 === targetDay) continue;
              const tDate = new Date(y, m, d2);
              if(tDate.getDay() === srcWeekday) {
                const dayKey = String(d2);
                if(!existing[dayKey]) existing[dayKey] = [];
                const alreadyExists = existing[dayKey].some(i => i.recurringId === item.id && i.recurringDay === d2);
                if(!alreadyExists) {
                  existing[dayKey].push({
                    id: `${item.id}_${y}_${m}_${d2}`,
                    recurringId: item.id,
                    recurringDay: d2,
                    desc: item.desc,
                    valor: item.valor,
                    pago: false,
                    repeat: 'weekly'
                  });
                }
              }
            }
          }
        });
      });
    } catch(e) {}
  });

  sd(y, m, existing);
}
function changeMonth(d2){cM+=d2;if(cM>11){cM=0;cY++;}if(cM<0){cM=11;cY--;}injectRecurring(cY,cM);render();}
function setTab(t){tab=t;document.getElementById('tabPagar').className='tab'+(t==='pagar'?' active-pagar':'');document.getElementById('tabPago').className='tab'+(t==='pago'?' active-pago':'');renderDays();}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function allIt(){return Object.values(gcd()).flat();}
function render(){document.getElementById('monthName').textContent=MONTHS[cM];document.getElementById('yearName').textContent=cY;renderDays();}

function renderDays(){
  const d=gcd(),days=dim(cY,cM),tD=now.getDate(),tM=now.getMonth(),tY=now.getFullYear(),cur=cY===tY&&cM===tM;
  const ai=allIt(),cp=ai.filter(i=>!i.pago).length,cg=ai.filter(i=>i.pago).length;
  document.getElementById('badgePagar').textContent=cp;
  document.getElementById('badgePago').textContent=cg;
  let h='';
  for(let day=1;day<=days;day++){
    const k=String(day),items=d[k]||[],f=tab==='pagar'?items.filter(i=>!i.pago):items.filter(i=>i.pago);
    if(tab==='pago'&&f.length===0)continue;
    const it=cur&&day===tD,wd=WD[new Date(cY,cM,day).getDay()],dt2=items.reduce((s,i)=>s+i.valor,0),si=f.length>0;
    h+=`<div class="day-card${it?' is-today':''}" id="dc-${day}"><div class="day-header" onclick="tdx(${day})"><div class="day-left"><div class="day-badge${it?' today-badge':''}"><span class="day-num">${String(day).padStart(2,'0')}</span></div><span class="day-week">${wd}</span>${it?'<span class="today-pill">hoje</span>':''}</div><div class="day-right">${items.length>0?`<span class="day-total">${brl(dt2)}</span>`:''}<button class="add-btn" onclick="event.stopPropagation();om(${day})">+</button>${si?`<span class="chevron open" id="chev-${day}">▾</span>`:''}</div></div>`;
    if(si){
      h+=`<div class="items-list" id="items-${day}">`;
      for(const item of f){
        const rl=repeatLabel(item.repeat);
        h+=`<div class="item-row${item.pago?' is-paid':''}${item.repeat&&item.repeat!=='none'?' is-recurring':''}">`;
        h+=`<div class="checkbox${item.pago?' checked':''}" onclick="ti(${day},'${item.id}')"></div>`;
        h+=`<div class="item-info" onclick="oe(${day},'${item.id}')"><div class="item-main"><span class="item-desc${item.pago?' paid-text':''}">${es(item.desc)}</span>${rl?`<span class="item-repeat-tag">${rl}</span>`:''}</div><span class="item-valor${item.pago?' paid-valor':''}">${brl(item.valor)}</span></div>`;
        h+=`<button class="delete-btn" onclick="ad(${day},'${item.id}','${es(item.desc)}')">🗑</button></div>`;
      }
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  const tg=ai.filter(i=>i.pago).reduce((s,i)=>s+i.valor,0),tp=ai.filter(i=>!i.pago).reduce((s,i)=>s+i.valor,0);
  const isCartaoFn=i=>i.desc.toUpperCase().includes('CARTAO')||i.desc.toUpperCase().includes('CART\u00c3O');
  const tCartao=ai.filter(isCartaoFn).reduce((s,i)=>s+i.valor,0);
  const tFixos=(tg+tp)-tCartao;
  if(tab==='pago'&&cg===0) h+=`<div class="empty-tab"><div style="font-size:36px;margin-bottom:10px">✅</div><p>Nenhum item pago ainda.</p></div>`;
  h+=`<div class="summary"><div class="summary-row"><span class="summary-label">Total a pagar</span><span class="summary-val orange">${brl(tp)}</span></div><div class="summary-divider"></div><div class="summary-row"><span class="summary-label">Total pago</span><span class="summary-val green">${brl(tg)}</span></div><div class="summary-divider thick"></div><div class="summary-row"><span class="summary-label total-label">Gasto total do mês</span><span class="summary-val total-val">${brl(tg+tp)}</span></div><div class="summary-divider"></div><div class="summary-row"><span class="summary-label fixos-label">💰 Gastos fixos mensais</span><span class="summary-val fixos-val">${brl(tFixos)}</span></div></div>`;
  document.getElementById('daysList').innerHTML=h;
}

function tdx(day){const el=document.getElementById(`items-${day}`),ch=document.getElementById(`chev-${day}`);if(!el)return;const hi=el.style.display==='none';el.style.display=hi?'':'none';if(ch)ch.classList.toggle('open',hi);}
function es(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// ---- REPEAT ----
function setRepeat(val){
  curRepeat=val;
  ['none','monthly','weekly'].forEach(r=>{
    document.getElementById(`rep-${r}`).classList.toggle('selected', r===val);
  });
}

// ---- MODAL ----
function om(day){
  mDay=day;eId=null;
  document.getElementById('modalTitle').textContent=`Novo item — Dia ${String(day).padStart(2,'0')}`;
  document.getElementById('inputDesc').value='';
  document.getElementById('inputValor').value='';
  setRepeat('none');
  document.getElementById('btnSave').textContent='Adicionar';
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('inputDesc').focus(),350);
}
function oe(day,id){
  const items=(gcd()[String(day)]||[]),item=items.find(i=>i.id===id);
  if(!item)return;
  mDay=day;eId=id;
  document.getElementById('modalTitle').textContent=`Editar — Dia ${String(day).padStart(2,'0')}`;
  document.getElementById('inputDesc').value=item.desc;
  document.getElementById('inputValor').value=item.valor.toFixed(2).replace('.',',');
  setRepeat(item.repeat||'none');
  document.getElementById('btnSave').textContent='Salvar';
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
function handleOverlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

function saveItem(){
  const desc=document.getElementById('inputDesc').value.trim(),valor=pv(document.getElementById('inputValor').value);
  if(!desc||valor<=0)return;
  const d=gcd(),k=String(mDay);
  if(!d[k])d[k]=[];
  if(eId){d[k]=d[k].map(i=>i.id===eId?{...i,desc,valor,repeat:curRepeat}:i);}
  else{d[k].push({id:Date.now().toString(),desc,valor,pago:false,repeat:curRepeat});}
  pc();
  if(curRepeat !== 'none') { injectRecurring(cY, cM); }
  closeModal();renderDays();
}

function ti(day,id){
  const d=gcd(),k=String(day);
  d[k]=(d[k]||[]).map(i=>i.id===id?{...i,pago:!i.pago}:i);
  pc();renderDays();
}

function ad(day,id,desc){dTgt={day,id};document.getElementById('confirmMsg').textContent=`Deseja excluir "${desc}"?`;document.getElementById('confirmOverlay').classList.add('show');}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('show');dTgt=null;}
function confirmDelete(){
  if(!dTgt)return;
  const d=gcd(),k=String(dTgt.day);
  d[k]=(d[k]||[]).filter(i=>i.id!==dTgt.id);
  pc();closeConfirm();renderDays();
}

// ---- PICKER ----
function openPicker(){pY=cY;rpg();document.getElementById('pickerOverlay').classList.add('show');}
function handlePickerClick(e){if(e.target===document.getElementById('pickerOverlay'))document.getElementById('pickerOverlay').classList.remove('show');}
function changePickerYear(d2){pY+=d2;rpg();}
function rpg(){document.getElementById('pickerYearLabel').textContent=pY;document.getElementById('monthGrid').innerHTML=MS.map((m,i)=>`<button class="month-item${i===cM&&pY===cY?' selected':''}" onclick="sm(${i})">${m}</button>`).join('');}
function sm(m){cM=m;cY=pY;document.getElementById('pickerOverlay').classList.remove('show');injectRecurring(cY,cM);render();}

// ---- TOAST ----
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ---- WHATSAPP ----
function shareWhatsApp(){
  const d=gcd(),days=dim(cY,cM);
  let msg=`💸 *Gastos de ${MONTHS[cM]} ${cY}*\n\n`;
  let hasItems=false;
  for(let day=1;day<=days;day++){
    const items=(d[String(day)]||[]).filter(i=>!i.pago);
    if(items.length===0)continue;
    hasItems=true;
    msg+=`*Dia ${String(day).padStart(2,'0')}*\n`;
    items.forEach(i=>{msg+=`• ${i.desc} — ${brl(i.valor)}\n`;});
    msg+='\n';
  }
  if(!hasItems){showToast('Nenhum item a pagar este mês!');return;}
  const ai=allIt();
  const tp=ai.filter(i=>!i.pago).reduce((s,i)=>s+i.valor,0);
  msg+=`📊 *Total a pagar: ${brl(tp)}*`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
}

// ---- PDF ----
function exportPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const d=gcd(),days=dim(cY,cM);
  const ai=allIt();
  const tPago=ai.filter(i=>i.pago).reduce((s,i)=>s+i.valor,0);
  const tPagar=ai.filter(i=>!i.pago).reduce((s,i)=>s+i.valor,0);

  // Header
  doc.setFillColor(232,115,42);
  doc.rect(0,0,210,28,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(18);
  doc.setFont('helvetica','bold');
  doc.text(`Gastos de ${MONTHS[cM]} ${cY}`,14,18);

  let y=36;
  doc.setTextColor(45,74,56);

  for(let day=1;day<=days;day++){
    const items=d[String(day)]||[];
    if(items.length===0)continue;

    if(y>260){doc.addPage();y=20;}

    // Day header
    doc.setFillColor(247,248,245);
    doc.roundedRect(10,y-5,190,8,2,2,'F');
    doc.setFontSize(11);
    doc.setFont('helvetica','bold');
    doc.setTextColor(45,74,56);
    const wd=WD[new Date(cY,cM,day).getDay()];
    doc.text(`${String(day).padStart(2,'0')} — ${wd}`,14,y);
    y+=8;

    items.forEach(item=>{
      if(y>270){doc.addPage();y=20;}
      doc.setFontSize(10);
      doc.setFont('helvetica','normal');
      doc.setTextColor(item.pago?139:45, item.pago?168:74, item.pago?148:56);
      const status=item.pago?'✓':'○';
      doc.text(`  ${status}  ${item.desc}`,14,y);
      doc.setFont('helvetica','bold');
      doc.setTextColor(item.pago?74:232, item.pago?124:115, item.pago?89:42);
      doc.text(brl(item.valor),196,y,{align:'right'});
      if(item.pago){
        doc.setDrawColor(139,168,148);
        doc.line(20,y-1,140,y-1);
      }
      y+=7;
    });
    y+=3;
  }

  // Summary
  if(y>240){doc.addPage();y=20;}
  y+=4;
  doc.setFillColor(232,115,42);

// ---- BACKUP & RESTORE ----
function backupData(){
  // Collect ALL gastos keys from localStorage
  const backup = {};
  for(let i=0; i<localStorage.length; i++){
    const key = localStorage.key(i);
    if(key && key.startsWith('gastos_')){
      backup[key] = JSON.parse(localStorage.getItem(key));
    }
  }
  if(Object.keys(backup).length === 0){ showToast('Nenhum dado para salvar!'); return; }
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gastos-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 Backup salvo!');
}

function restoreData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const backup = JSON.parse(e.target.result);
      let count = 0;
      Object.entries(backup).forEach(([key, value]) => {
        if(key.startsWith('gastos_')){
          localStorage.setItem(key, JSON.stringify(value));
          count++;
        }
      });
      dt = {}; // clear cache
      injectRecurring(cY, cM);
      render();
      showToast(`✅ ${count} meses restaurados!`);
    } catch(err) {
      showToast('Erro ao restaurar arquivo!');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}


document.addEventListener('DOMContentLoaded',()=>{
  const iv=document.getElementById('inputValor');
  iv.addEventListener('input',function(){this.value=fv(this.value);});
  iv.addEventListener('keydown',function(e){if(e.key==='Enter')saveItem();});
  document.getElementById('inputDesc').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('inputValor').focus();});
  injectRecurring(cY,cM);
  render();
});
